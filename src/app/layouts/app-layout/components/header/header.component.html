<header class="flex justify-end items-center px-10 pt-10 pb-4 border-b border-slate-100 gap-6 relative">

    <!-- Notifications -->
    <div class="relative">
  
      <button
        (click)="toggleNotifications()"
        class="relative text-slate-400 hover:text-primary transition">
  
        <span class="material-symbols-outlined">notifications</span>
  
        <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
  
      </button>
  
      @if (showNotifications()) {
        <div class="absolute right-0 mt-4 w-72 bg-white rounded-2xl shadow-xl border border-slate-100 p-4 z-50">
  
          <h4 class="text-sm font-bold text-dark-grey mb-3">Notificaciones</h4>
  
          <div class="space-y-3 text-sm text-slate-600">
  
            <div class="p-3 bg-slate-50 rounded-xl">
              Nuevo empleado registrado.
            </div>
  
            <div class="p-3 bg-slate-50 rounded-xl">
              Nómina generada correctamente.
            </div>
  
            <div class="p-3 bg-slate-50 rounded-xl">
              Solicitud pendiente de aprobación.
            </div>
  
          </div>
  
        </div>
      }
  
    </div>
  
    <!-- User -->
    <div class="flex items-center gap-3">
  
      <div class="text-right hidden sm:block">
        <p class="text-sm font-bold text-dark-grey">Carlos Mendoza</p>
        <p class="text-xs text-slate-400">Admin Principal</p>
      </div>
  
      <!-- Icon instead of photo -->
      <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center ring-2 ring-primary/20">
        <span class="material-symbols-outlined text-primary">
          person
        </span>
      </div>
  
    </div>
  
  </header>
