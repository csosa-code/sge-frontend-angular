<a [routerLink]="item().route" routerLinkActive="bg-primary text-white"   [routerLinkActiveOptions]="{ exact: true }"
class="flex items-center gap-4 px-5 py-3.5 rounded-2xl hover:bg-white/80 hover:text-primary transition">
<span class="material-symbols-outlined">{{ item().icon }}</span>
<span class="text-sm">{{ item().label }}</span>
</a>
