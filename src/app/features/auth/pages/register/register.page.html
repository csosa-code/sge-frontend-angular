<div class="bg-page-bg text-dark-grey min-h-screen flex flex-col items-center justify-center p-4 lg:p-6">

  <div class="w-full max-w-md">

    <div class="bg-white w-full flex flex-col p-10 rounded-[3rem] shadow-xl border border-slate-100 p-10 lg:p-14">

      <div class="flex flex-col items-center mb-12">
        <div class="bg-primary rounded-lg p-2.5 flex items-center justify-center mb-4">
          <span class="material-symbols-outlined text-white text-3xl">grid_view</span>
        </div>
        <h1 class="text-dark-grey text-2xl font-bold leading-tight tracking-tight">Crear cuenta</h1>
        <p class="text-muted-grey text-sm font-normal">Sistema de Gestión Empresarial</p>
      </div>


      <form [formGroup]="form" class="space-y-5">

        <app-input label="Nombre" type="text" icon="person" placeholder="Juan" formControlName="firstName" />

        <app-input label="Apellido" type="text" icon="person_outline" placeholder="Perez" formControlName="lastName" />

        <app-input label="Correo electrónico" type="email" icon="mail" placeholder="juan.perez@empresa.com"
          formControlName="email" />

        <app-input label="Contraseña" type="password" icon="lock" placeholder="••••••••" formControlName="password" />

        <button
          (click)="register()"
          class="w-full flex items-center justify-center py-4 px-6 rounded-2xl bg-primary hover:bg-primary/90 text-white font-bold text-sm tracking-wide transition-all shadow-lg shadow-primary/25 hover:translate-y-[-1px]"
          type="submit">
          Crear cuenta
        </button>
        <div class="mt-8 text-center">
          <p class="text-sm text-muted-grey font-medium"> ¿Ya tienes una cuenta? <a
              class="text-primary hover:text-primary/80 transition-colors hover:underline decoration-2 underline-offset-4 ml-1"
              routerLink="/auth/login">Iniciar sesión</a></p>
        </div>
      </form>

    </div>
    <p class="mt-8 text-center text-xs text-slate-400 dark:text-slate-500">© 2024 Enterprise Core System. Todos los
      derechos reservados.</p>

  </div>

</div>
