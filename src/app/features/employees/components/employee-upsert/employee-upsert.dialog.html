<div class="p-8 w-full">
    <div class="mb-8">
        <h3 class="text-3xl font-black text-dark-grey tracking-tight">{{ isEdit() ? 'Actualización de Empleado' :
            'Registro de Nuevo Empleado' }}</h3>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Complete la información requerida para
            {{ isEdit() ? 'actualizar los datos del empleado.' : 'el nuevo integrante del equipo.' }}</p>
    </div>


    <form [formGroup]="form" class="grid grid-cols-2 gap-x-8 gap-y-6 max-w-4xl mx-auto">


        <div class="col-span-2 md:col-span-1">
            <app-input label="Nombre" type="text" icon="person" placeholder="Ej. Juan" formControlName="firstName" />
        </div>

        <div class="col-span-2 md:col-span-1">
            <app-input label="Apellido" type="text" icon="person_outline" placeholder="Ej. Pérez"
                formControlName="lastName" />
        </div>


        <div class="col-span-2 md:col-span-1">
            <app-input label="Número de Documento" type="text" icon="numbers" placeholder="Ej. 1234567890"
                formControlName="documentNumber" />
        </div>


        <div class="col-span-2 md:col-span-1">
            <label class="block text-sm font-bold text-slate-700 mb-2">Departamento</label>
            <div class="relative">
                <select
                    formControlName="areaId"
                    class="w-full appearance-none px-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50/50 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all">
                    <option [ngValue]="null">Seleccione un área</option>
                    @for (area of areas(); track area.areaId) {
                    <option [ngValue]="area.areaId">{{ area.name }}</option>
                    }
                </select>
            </div>
        </div>


        <div class="col-span-2 md:col-span-1">
            <app-input label="Salario Mensual" type="number" icon="attach_money" placeholder="Ej. 1000.00"
                formControlName="salary" />
        </div>

        <div class="col-span-2 md:col-span-1">
            <app-input label="Fecha de Ingreso" type="date" icon="calendar_month" placeholder="Ej. 2024-01-01"
                formControlName="startDate" />
        </div>


        <div class="col-span-2 flex items-center justify-center gap-4 mt-10 pt-8 border-t border-slate-50">
            <button (click)="close()"
                class="px-10 py-3.5 rounded-2xl border border-slate-100 text-slate-500 font-semibold hover:bg-slate-50 transition-colors"
                type="button">
                Cancelar
            </button>
            <button (click)="save()" [disabled]="form.invalid" type="submit" class="
    px-10 py-3.5 rounded-2xl font-semibold transition-all flex items-center gap-2
    bg-primary text-white shadow-lg shadow-primary/30 hover:bg-primary/90
    disabled:bg-slate-300 disabled:text-slate-500 disabled:shadow-none disabled:cursor-not-allowed disabled:hover:bg-slate-300
  ">
                <span class="material-symbols-outlined text-[20px]">person_add</span>
                Guardar Empleado
            </button>
        </div>
    </form>

</div>
