<div class="p-8 w-full">
    <div class="mb-8">
        <h3 class="text-3xl font-black text-dark-grey tracking-tight">{{ isEdit() ? 'Actualización de Departamento' :
            'Registro de Nuevo Departamento' }}</h3>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Complete la información requerida para
            {{ isEdit() ? 'actualizar los datos del departamento.' : 'el nuevo departamento.' }}</p>
    </div>


    <form [formGroup]="form" class="grid grid-cols-2 gap-x-8 gap-y-6 max-w-4xl mx-auto">


        <div class="col-span-2 md:col-span-1">
            <app-input label="Nombre" type="text" icon="person" placeholder="Ej. Ventas" formControlName="name" />
        </div>

        <div class="col-span-2 md:col-span-1">
            <app-input label="Descripción" type="text" icon="person_outline" placeholder="Ej. Ventas de productos"
                formControlName="description" />
        </div>

        <div class="col-span-2 md:col-span-1">
            <label class="block text-sm font-bold text-slate-700 mb-2">Estado</label>
            <div class="relative">
                <select
                    formControlName="statusId"
                    class="w-full appearance-none px-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50/50 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all">
                    <option [ngValue]="null">Seleccione un estado</option>
                    @for (status of statuses(); track status.statusId) {
                    <option [ngValue]="status.statusId">{{ status.name }}</option>
                    }
                </select>
            </div>
        </div>

        <div class="col-span-2 flex items-center justify-center gap-4 mt-10 pt-8 border-t border-slate-50">
            <button (click)="close()"
                class="px-10 py-3.5 rounded-2xl border border-slate-100 text-slate-500 font-semibold hover:bg-slate-50 transition-colors"
                type="button">
                Cancelar
            </button>
            <button (click)="save()" [disabled]="form.invalid" type="submit" class="
    px-10 py-3.5 rounded-2xl font-semibold transition-all flex items-center gap-2
    bg-primary text-white shadow-lg shadow-primary/30 hover:bg-primary/90
    disabled:bg-slate-300 disabled:text-slate-500 disabled:shadow-none disabled:cursor-not-allowed disabled:hover:bg-slate-300
  ">
                <span class="material-symbols-outlined text-[20px]">person_add</span>
                Guardar Departamento
            </button>
        </div>
    </form>

</div>
